services:
  mlflow:
    image: python:3.11-slim
    command: >
      sh -c "pip install --no-cache-dir mlflow==3.11.1 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts mlflow,localhost,127.0.0.1,mlflow:5000,localhost:5001
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=SentimentAnalyzer
      - MODEL_STAGE=Production
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  monitor:
    image: python:3.11-slim
    command: >
      sh -c "pip install --no-cache-dir
      evidently>=0.6.0 pandas>=2.0.0 numpy>=1.24.0
      datasets>=2.14.0 requests>=2.31.0 &&
      python /app/monitor_production.py
      --mode live
      --api-url http://api:8000
      --num-samples 100
      --interval 120"
    volumes:
      - ../../Sesion10/monitor_production.py:/app/monitor_production.py:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  mlflow_data:
