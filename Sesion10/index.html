<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis — Sesión 10</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --positive: #4ade80;
            --positive-bg: rgba(74, 222, 128, 0.12);
            --negative: #f87171;
            --negative-bg: rgba(248, 113, 113, 0.12);
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 720px;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        button {
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: #475569;
            color: var(--text);
        }

        /* Results */
        .results {
            display: none;
        }

        .results.visible {
            display: block;
        }

        .results h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        .result-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: border-color 0.2s;
        }

        .result-item:hover {
            border-color: var(--accent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-positive {
            background: var(--positive-bg);
            color: var(--positive);
            border: 1px solid rgba(74, 222, 128, 0.25);
        }

        .badge-negative {
            background: var(--negative-bg);
            color: var(--negative);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .result-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
            word-break: break-word;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid var(--bg);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            background: var(--negative-bg);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--negative);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-dot.ok {
            background: var(--positive);
        }

        .status-dot.err {
            background: var(--negative);
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.75rem;
            }

            .card {
                padding: 1rem;
            }

            .btn-row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎭 Análisis de Sentimiento</h1>
            <p>Introduce uno o varios textos y obtén la predicción del modelo en tiempo real.</p>
        </header>

        <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Comprobando API…</span>
        </div>

        <div class="card">
            <label for="inputText">Texto(s) a analizar</label>
            <textarea id="inputText"
                placeholder="Escribe aquí el texto a analizar. Puedes introducir varios, uno por línea."></textarea>
            <p class="hint">Cada línea se enviará como un texto independiente para clasificar.</p>

            <div class="btn-row">
                <button class="btn-primary" id="btnPredict" disabled>
                    Predecir sentimiento
                </button>
                <button class="btn-secondary" id="btnClear">Limpiar</button>
            </div>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="results card" id="resultsCard">
            <h2>Resultados</h2>
            <div id="resultsList"></div>
        </div>

        <footer>
            Sesión 10 — Monitorización · <a href="/docs" target="_blank">API Docs</a> ·
            <a href="/health" target="_blank">Health</a>
        </footer>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const btnPredict = document.getElementById('btnPredict');
        const btnClear = document.getElementById('btnClear');
        const resultsCard = document.getElementById('resultsCard');
        const resultsList = document.getElementById('resultsList');
        const errorMsg = document.getElementById('errorMsg');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Check API health on load
        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                if (data.status === 'ok') {
                    statusDot.className = 'status-dot ok';
                    statusText.textContent = `API conectada · Modelo: ${data.model_uri}`;
                    btnPredict.disabled = false;
                } else {
                    throw new Error('status not ok');
                }
            } catch {
                statusDot.className = 'status-dot err';
                statusText.textContent = 'API no disponible';
                btnPredict.disabled = true;
            }
        }

        checkHealth();

        btnPredict.addEventListener('click', async () => {
            const raw = inputText.value.trim();
            if (!raw) return;

            const texts = raw.split('\n').map(t => t.trim()).filter(t => t.length > 0);
            if (texts.length === 0) return;

            btnPredict.disabled = true;
            btnPredict.innerHTML = '<span class="spinner"></span> Prediciendo…';
            errorMsg.className = 'error-msg';
            resultsCard.className = 'results card';

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texts }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || `Error ${res.status}`);
                }

                const data = await res.json();
                renderResults(texts, data);
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.className = 'error-msg visible';
            } finally {
                btnPredict.disabled = false;
                btnPredict.innerHTML = 'Predecir sentimiento';
            }
        });

        btnClear.addEventListener('click', () => {
            inputText.value = '';
            resultsCard.className = 'results card';
            errorMsg.className = 'error-msg';
            inputText.focus();
        });

        // Allow Ctrl+Enter to predict
        inputText.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                btnPredict.click();
            }
        });

        function renderResults(texts, data) {
            resultsList.innerHTML = '';
            texts.forEach((text, i) => {
                const label = data.labels[i];
                const isPositive = label === 'POSITIVE';
                const badgeClass = isPositive ? 'badge-positive' : 'badge-negative';
                const icon = isPositive ? '😊' : '😞';

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <span class="badge ${badgeClass}">${icon} ${label}</span>
                    <span class="result-text">${escapeHtml(text)}</span>
                `;
                resultsList.appendChild(item);
            });
            resultsCard.className = 'results card visible';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>

</html>
